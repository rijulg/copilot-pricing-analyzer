name: Update models pricing

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate models.js
        run: python3 scripts/update-models.py

      - name: Commit changes
        run: |
          if git diff --quiet -- models.js; then
            echo "No pricing changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add models.js
          git commit -m "chore: update models.js pricing from GitHub docs"
          git push
