name: Update models pricing

on:
  schedule:
    # Daily at 06:17 UTC.
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerate models.js
        run: node scripts/update-models.js

      - name: Commit changes
        run: |
          if git diff --quiet -- models.js; then
            echo "No pricing changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add models.js
          git commit -m "chore: update models.js pricing from GitHub docs"
          git push
